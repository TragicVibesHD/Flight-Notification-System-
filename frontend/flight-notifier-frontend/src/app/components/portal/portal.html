<div class="portal-container">
  <div class="top-bar">
    <h2>Flight Notification Portal</h2>
    <div>
      <button (click)="goToSentLog()">View Sent Log</button>
      <button (click)="logout()">Log Out</button>
    </div>
  </div>

  <form (ngSubmit)="onSend()">
    <fieldset>
      <legend>Flight</legend>

      <label>Select Flight</label>
      <select [(ngModel)]="selectedFlightId" name="selectedFlightId" required>
        <option [ngValue]="null" disabled>-- Choose a flight --</option>
        @for (flight of flights; track flight.id) {
          <option [ngValue]="flight.id">
            {{ flight.flight_number }} — Gate {{ flight.gate }} — Departs {{ flight.departure_time }}
          </option>
        }
      </select>
    </fieldset>

    <fieldset>
      <legend>Message</legend>
      <textarea [(ngModel)]="message" name="message" rows="4" required></textarea>
    </fieldset>

    <fieldset>
      <legend>Recipients</legend>

      <label class="send-all">
        <input type="checkbox" [(ngModel)]="sendToAll" name="sendToAll">
        Send to all customers
      </label>

      <div class="customer-list">
        @for (customer of customers; track customer.id) {
          <label class="customer-item">
            <input
              type="checkbox"
              [disabled]="sendToAll"
              (change)="toggleCustomer(customer.id, $event.target.checked)">
            {{ customer.first_name }} {{ customer.last_name }} ({{ customer.email }})
          </label>
        }
      </div>
    </fieldset>

    <button type="submit" [disabled]="sending">
      {{ sending ? 'Sending...' : 'Send Notification' }}
    </button>

    @if (successMessage) {
      <p class="success">{{ successMessage }}</p>
    }
    @if (errorMessage) {
      <p class="error">{{ errorMessage }}</p>
    }
  </form>
</div>
