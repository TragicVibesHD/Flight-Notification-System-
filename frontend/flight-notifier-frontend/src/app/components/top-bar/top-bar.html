<header class="top-bar">
  <img src="logo.png" alt="Caribbean Airlines" class="logo">

  @if (auth.isLoggedIn()) {
    <nav class="nav-links">
      <a routerLink="/flight-search" routerLinkActive="active">Flight Search</a>
      <a routerLink="/dashboard" routerLinkActive="active">Customer Management</a>
    </nav>

    <div class="user-actions">
      @if (auth.currentUsername()) {
        <div class="user-greeting">
          <span class="user-icon">●</span>
          Hi, {{ auth.currentUsername() }}
        </div>
      }
      <button class="logout-button" (click)="logout()">Log Out</button>
    </div>
  }
</header>
